[build]
  command = "cat > .env <<EOF\nBACKEND_ENV=${BACKEND_ENV:-prod}\nBACKEND_URL_LOCAL=${BACKEND_URL_LOCAL:-http://localhost:5000}\nBACKEND_URL_ANDROID_EMULATOR=${BACKEND_URL_ANDROID_EMULATOR:-http://10.0.2.2:5000}\nBACKEND_URL_PROD=${BACKEND_URL_PROD:-https://flowgnimag.onrender.com}\nBACKEND_URL_OVERRIDE=${BACKEND_URL_OVERRIDE:-}\nPULSEIQ_API_KEY=${PULSEIQ_API_KEY:-}\nEOF\nif [ ! -d \"$HOME/flutter\" ]; then git clone https://github.com/flutter/flutter.git --depth 1 -b stable $HOME/flutter; else git -C $HOME/flutter fetch --depth 1 origin stable && git -C $HOME/flutter checkout stable && git -C $HOME/flutter reset --hard origin/stable; fi && export PATH=\"$PATH:$HOME/flutter/bin\" && flutter --version && flutter pub get && flutter build web --release && cp web/_redirects build/web/_redirects"
  publish = "build/web"

[build.environment]
  FLUTTER_VERSION = "stable"
